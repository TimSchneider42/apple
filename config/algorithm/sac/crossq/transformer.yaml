# @package algorithm
defaults:
  - ../transformer_base
  - apple_base
  - override /agent/image_encoder@agent.image_encoder: vit
  - _self_

batch_size: 8

update_to_data_ratio: 3.5
initial_utd: 0.25
utd_warmup_steps_rel: 0.45

actor_optimizer:
  type: ADAMW
  learning_rate:
    value: 3e-4

critic_optimizer:
  type: ADAMW
  learning_rate:
    value: 6e-5

alpha_optimizer:
  type: ADAMW
  learning_rate:
    value: 6e-5
